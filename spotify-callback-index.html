<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Spotify Auth</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: sans-serif;
    background: #0e0e0f;
    color: #f0ede8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    background: #161618;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    width: 90%;
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  p { font-size: 14px; color: #7a7878; margin-bottom: 24px; }
  .token-box {
    background: #1e1e22;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 12px;
    color: #c9a96e;
    word-break: break-all;
    text-align: left;
    margin-bottom: 16px;
    max-height: 80px;
    overflow-y: auto;
  }
  button {
    background: #1db954;
    color: #000;
    border: none;
    padding: 12px 28px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  button:hover { opacity: .85; }
  .copied { background: #4ade80; }
  .error { color: #f87171; }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="icon">🎵</div>
  <h1 id="title">Chargement...</h1>
  <p id="sub"></p>
  <div id="content"></div>
</div>

<script>
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const error = params.get('error');

  if (error) {
    document.getElementById('title').textContent = 'Erreur';
    document.getElementById('sub').textContent = error;
    document.getElementById('title').classList.add('error');
  } else if (token) {
    document.getElementById('title').textContent = 'Connecté ! ✅';
    document.getElementById('sub').textContent = 'Copie ce token et colle-le dans Personal HQ → Paramètres → Spotify';
    document.getElementById('content').innerHTML = `
      <div class="token-box" id="token-display">${token}</div>
      <button id="copy-btn" onclick="copyToken()">📋 Copier le token</button>
    `;

    // Auto-copy
    navigator.clipboard.writeText(token).catch(() => {});
  } else {
    document.getElementById('title').textContent = 'Aucun token trouvé';
    document.getElementById('sub').textContent = 'Retourne sur Personal HQ et réessaie.';
  }

  function copyToken() {
    navigator.clipboard.writeText(token).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✅ Copié !';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 Copier le token';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
</body>
</html>
